{% extends 'base.html' %}

{% block content %}
<div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; justify-content: center; align-items: center;">
    <div style="background: white; border-radius: 12px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); text-align: center; max-width: 400px;">
        <h2 style="margin-top: 0; color: #1f2937;">Assessment Submitted</h2>
        <p style="font-size: 1.1rem; color: #374151; line-height: 1.6; margin: 20px 0;">ഫലത്തിനായി നിങ്ങളുടെ കൗൺസിലറെ ബന്ധപ്പെടുക.</p>
        <a id="ok-button" class="button-link" href="{{ url_for('logout') }}" style="display: inline-block; margin-top: 16px;">OK</a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var overlay = document.getElementById('modal-overlay');
        overlay.style.display = 'flex';
    });
</script>
{% endblock %}
