{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>Register</h2>
    <form method="post">
        <div class="question-group">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:8px;">
        </div>
        <div class="question-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:8px;">
        </div>
        <div class="question-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:8px;">
        </div>
        <div class="question-group">
            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" required style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:8px;">
        </div>
        <input type="submit" value="Register">
    </form>
    <p style="margin-top:16px;">Already have an account? <a href="{{ url_for('login') }}">Login here</a>.</p>
</div>
{% endblock %}
